<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - MiniSteam</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html">🎮 MiniSteam</a>
        <div class="menu">
            <a href="registro.html">Crear Cuenta</a>
        </div>
    </nav>

    <main class="container">
        <div class="form-container">
            <h2>Iniciar Sesión</h2>
            <form id="formLogin">
                <div class="group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="******" required>
                </div>
                <div id="mensajeError" class="error-box"></div>
                <button type="submit" class="btn-steam">Entrar a mi cuenta</button>
            </form>
            <p class="footer-form">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
