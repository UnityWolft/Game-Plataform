<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - MiniSteam</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="form-container">
        <h2>Crear Cuenta</h2>
        <form id="formRegistro">
            <input type="text" id="nombre" placeholder="Nombre completo" style="width:100%; margin-bottom:10px;">
            <input type="email" id="correo" placeholder="Email" style="width:100%; margin-bottom:10px;">
            <input type="password" id="password" placeholder="Contraseña" style="width:100%; margin-bottom:10px;">
            <div id="errorBox" class="error-msg"></div>
            <button type="submit" class="btn-steam" style="width:100%; padding:10px; cursor:pointer;">Registrarse</button>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
